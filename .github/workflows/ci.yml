name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Check formatting (gofmt)
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Lint install.sh (shellcheck)
        # ubuntu-latest ships shellcheck pre-installed.
        run: shellcheck install.sh

      - name: Test
        run: go test ./...

      - name: Integration contract tests (§8.2-8.3)
        # ubuntu-latest has bash 5+ and jq pre-installed.
        # Builds the binary once to test/integration/bin/crenein-agent,
        # then runs contract tests (no Docker required).
        #
        # To run the full-stack suite manually on a client-like VM (Docker required):
        #   sudo bash test/integration/full_stack.sh
        # Or with a pre-built binary:
        #   BIN=/usr/local/bin/crenein-agent sudo bash test/integration/full_stack.sh
        run: bash test/integration/run_contract_tests.sh
